name: CMake

on: [push, pull_request]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: 'recursive'
    - uses: actions/setup-python@v3
      with:
        python-version: '3.12'
    - name: ubuntu and source dependencies
      run: |
        curl -O https://raw.githubusercontent.com/MarcToussaint/rai/refs/heads/master/_make/install.sh && chmod a+x install.sh
        source install.sh vars_only #defines the following dependency packages
        sudo apt install --yes ${ubuntu_rai} ${ubuntu_botop} ${ubuntu_python}
        ./install.sh libccd
        ./install.sh fcl
        ./install.sh libann
    - name: python dependencies
      run: |
        python3 -m pip install  numpy pybind11 pybind11-stubgen
    - name: configure
      run: |
        cp _make/CMakeLists-ubuntu.txt CMakeLists.txt
        export PY_VER=`python3 -c "import sys; print(str(sys.version_info[0])+'.'+str(sys.version_info[1]))"`
        cmake . -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DUSE_PHYSX=OFF -DUSE_BULLET=OFF -DUSE_LIBFRANKA=OFF -DUSE_REALSENSE=OFF -DPY_VERSION=$PY_VER -DUSE_QHULL8=ON
    - name: build
      run: make -C build _robotic install
    - name: install
      run: python3 -m pip install -e .
    - name: test
      run: ry-info
